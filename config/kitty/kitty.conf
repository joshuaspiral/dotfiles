# Try this specific family name
font_family      Iosevka Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15

# --- Cursor ---
cursor_shape     block
# Kitty doesn't have a direct "vi_mode_style" equivalent in the main config, 
# but you can set the beam thickness for when you manually switch:
cursor_beam_thickness 1.5
cursor_blink_interval 0

# --- Window Layout & Appearance ---
window_padding_width 15
background_opacity   0.8
# hide_window_decorations yes

# --- Mouse & Selection ---
mouse_hide_wait      -1
copy_on_select       yes

# --- Environment & Shell ---
shell /bin/fish --login
env LANG=en_US.UTF-8
env LC_ALL=en_US.UTF-8

# --- General ---
# Kitty reloads config automatically on save by default
allow_remote_control yes



# BEGIN_KITTY_THEME
# Gruvbox Dark
include current-theme.conf
# END_KITTY_THEME
